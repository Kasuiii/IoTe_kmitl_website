version: '3.9'

services:
    app:
        build: .
        container_name: laravel_app
        ports:
            - '8080:8000'
        depends_on:
            - mysql
        environment:
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3308
            DB_DATABASE: iote_website
            DB_USERNAME: laravel
            DB_PASSWORD: secret

    mysql:
        image: mysql:8.0
        container_name: laravel_mysql
        restart: always
        environment:
            MYSQL_DATABASE: iote_website
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: laravel
            MYSQL_PASSWORD: secret
        ports:
            - '3308:3306'
        volumes:
            - mysql_data:/var/lib/mysql

volumes:
    mysql_data:
